<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&amp;family=Inter:wght@500;600&amp;display=swap');
      .brand-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 56px; fill: #0f172a; }
      .sub-text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 22px; fill: #0f766e; letter-spacing: 0.15em; text-transform: uppercase; }
    </style>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
  </defs>

  <g transform="translate(20, 20)">
    <path d="M 50,90 C 20,85 10,60 10,35 C 10,20 25,10 40,20 C 45,23 48,27 50,32 C 52,27 55,23 60,20 C 75,10 90,20 90,35 C 90,60 80,85 50,90 Z" fill="#ccfbf1" stroke="url(#tealGrad)" stroke-width="6" stroke-linejoin="round" />
    <path d="M 50,30 C 35,45 35,65 50,80 C 65,65 65,45 50,30 Z" fill="url(#blueGrad)" />
    <circle cx="50" cy="48" r="7" fill="#ffffff" />
  </g>

  <text x="135" y="80" class="brand-text">MindSaathi</text>
  <text x="140" y="115" class="sub-text">Schools</text>
</svg>
